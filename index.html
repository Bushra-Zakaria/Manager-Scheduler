<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<meta name="theme-color" content="#0f172a"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="مساعد المدير"/>
<title>مساعد المدير</title>
<link rel="manifest" href="manifest.json"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0f172a;--bg2:#1e293b;--bg3:#334155;--bg4:#475569;
  --accent:#38bdf8;--accent2:#0ea5e9;--accent-dim:#0c4a6e;
  --green:#4ade80;--green-dim:#14532d;
  --amber:#fbbf24;--amber-dim:#78350f;
  --red:#f87171;--red-dim:#7f1d1d;
  --text:#f1f5f9;--text2:#94a3b8;--text3:#64748b;
  --border:#1e293b;--radius:14px;--radius-sm:8px;
  --font:'IBM Plex Sans Arabic',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100dvh;overflow-x:hidden}
input,select,textarea,button{font-family:var(--font)}
.app{display:flex;flex-direction:column;min-height:100dvh;max-width:900px;margin:0 auto}
.header{padding:16px 20px 12px;border-bottom:1px solid var(--bg2);display:flex;align-items:center;justify-content:space-between;gap:12px}
.header-left{display:flex;flex-direction:column;gap:2px}
.header-clock{font-size:28px;font-weight:600;letter-spacing:-1px;color:var(--text);line-height:1}
.header-date{font-size:13px;color:var(--text2)}
.next-badge{background:var(--accent-dim);color:var(--accent);border-radius:var(--radius-sm);padding:6px 10px;font-size:12px;font-weight:500;text-align:center;max-width:200px;line-height:1.4}
.nav{display:flex;gap:4px;padding:12px 16px;border-bottom:1px solid var(--bg2);background:var(--bg);overflow-x:auto;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.nav-btn{padding:8px 16px;border-radius:var(--radius-sm);border:none;cursor:pointer;font-size:13px;font-weight:500;white-space:nowrap;transition:background .15s,color .15s;background:transparent;color:var(--text2)}
.nav-btn.active{background:var(--accent);color:#0c1a2e;font-weight:600}
.nav-btn:hover:not(.active){background:var(--bg2);color:var(--text)}
.content{flex:1;padding:16px;display:none}
.content.active{display:block}
.card{background:var(--bg2);border-radius:var(--radius);padding:16px;margin-bottom:12px;border:1px solid var(--bg3)}
.card-title{font-size:14px;font-weight:600;color:var(--text2);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.meeting{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid var(--bg3)}
.meeting:last-child{border-bottom:none;padding-bottom:0}
.meeting-dot{width:10px;height:10px;border-radius:50%;background:var(--accent);margin-top:5px;flex-shrink:0}
.meeting-dot.past{background:var(--bg4)}
.meeting-dot.soon{background:var(--amber);box-shadow:0 0 0 3px var(--amber-dim)}
.meeting-body{flex:1}
.meeting-title{font-size:15px;font-weight:500;color:var(--text);margin-bottom:3px}
.meeting-meta{font-size:12px;color:var(--text3)}
.meeting-note{font-size:12px;color:var(--text2);margin-top:4px;font-style:italic}
.meeting-person{display:inline-block;margin-top:5px;font-size:12px;background:var(--accent-dim);color:var(--accent);padding:2px 8px;border-radius:20px}
.meeting-actions{display:flex;flex-direction:column;gap:6px;align-items:flex-end}
.badge{font-size:11px;padding:3px 8px;border-radius:20px;font-weight:500}
.badge-soon{background:var(--amber-dim);color:var(--amber)}
.badge-ok{background:var(--green-dim);color:var(--green)}
.badge-past{background:var(--bg3);color:var(--text3)}
.badge-now{background:var(--red-dim);color:var(--red);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.del-btn{background:none;border:none;cursor:pointer;color:var(--text3);font-size:16px;padding:2px;transition:color .15s}
.del-btn:hover{color:var(--red)}
.form-row{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.form-row label{font-size:13px;color:var(--text2);font-weight:500}
.form-row input,.form-row select,.form-row textarea{
  background:var(--bg3);border:1px solid var(--bg4);border-radius:var(--radius-sm);
  color:var(--text);padding:10px 14px;font-size:15px;width:100%;
  transition:border .15s;appearance:none;-webkit-appearance:none
}
.form-row input:focus,.form-row select:focus{outline:none;border-color:var(--accent)}
.form-row select option{background:var(--bg2)}
.submit-btn{
  width:100%;padding:14px;background:var(--accent);color:#0c1a2e;
  border:none;border-radius:var(--radius);font-size:15px;font-weight:600;
  cursor:pointer;transition:opacity .15s;margin-top:4px
}
.submit-btn:active{opacity:.8}
.stickies{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:480px){.stickies{grid-template-columns:1fr}}
.sticky{border-radius:var(--radius);padding:16px;min-height:240px;display:flex;flex-direction:column;gap:10px}
.sticky-today{background:#1a2a1a;border:1px solid #2d5a2d}
.sticky-tomorrow{background:#1a1f2e;border:1px solid #1e3a5f}
.sticky-header{display:flex;align-items:center;justify-content:space-between}
.sticky-label{font-size:13px;font-weight:600}
.sticky-today .sticky-label{color:var(--green)}
.sticky-tomorrow .sticky-label{color:var(--accent)}
.sticky-date{font-size:11px;color:var(--text3)}
.task-list{display:flex;flex-direction:column;gap:8px;flex:1}
.task-item{display:flex;align-items:center;gap:8px}
.task-check{width:18px;height:18px;accent-color:var(--green);cursor:pointer;flex-shrink:0}
.task-text{font-size:14px;color:var(--text);flex:1;cursor:pointer}
.task-text.done{text-decoration:line-through;color:var(--text3)}
.task-del{background:none;border:none;cursor:pointer;color:var(--text3);font-size:14px;padding:2px;flex-shrink:0}
.task-del:hover{color:var(--red)}
.task-add{display:flex;gap:8px;margin-top:auto}
.task-add input{
  flex:1;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
  border-radius:var(--radius-sm);color:var(--text);padding:8px 10px;font-size:13px
}
.task-add input:focus{outline:none;border-color:var(--accent)}
.task-add button{
  padding:8px 12px;border-radius:var(--radius-sm);border:none;cursor:pointer;
  font-size:13px;font-weight:600
}
.sticky-today .task-add button{background:var(--green);color:#0a1f0a}
.sticky-tomorrow .task-add button{background:var(--accent);color:#0c1a2e}
.empty{text-align:center;padding:40px 20px;color:var(--text3);font-size:14px}
.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.stat{background:var(--bg2);border-radius:var(--radius-sm);padding:12px;text-align:center;border:1px solid var(--bg3)}
.stat-num{font-size:22px;font-weight:600;color:var(--accent);line-height:1}
.stat-label{font-size:11px;color:var(--text3);margin-top:3px}
.alert-bar{background:var(--amber-dim);border:1px solid var(--amber);border-radius:var(--radius-sm);
  padding:10px 14px;font-size:13px;color:var(--amber);margin-bottom:12px;display:none;
  animation:pulse 2s infinite}
.sync-bar{background:var(--bg2);border:1px solid var(--bg3);border-radius:var(--radius-sm);
  padding:8px 12px;font-size:12px;color:var(--text3);margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block;margin-left:6px}
.sync-dot.syncing{background:var(--amber);animation:pulse 1s infinite}
.sync-dot.error{background:var(--red)}

/* Alarm overlay */
.alarm-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);
  z-index:9999;align-items:center;justify-content:center;flex-direction:column;gap:20px;
  text-align:center;padding:20px
}
.alarm-overlay.show{display:flex}
.alarm-icon{font-size:60px;animation:shake .5s infinite}
@keyframes shake{0%,100%{transform:rotate(-8deg)}50%{transform:rotate(8deg)}}
.alarm-title{font-size:22px;font-weight:600;color:var(--amber);line-height:1.3}
.alarm-sub{font-size:15px;color:var(--text2)}
.alarm-person{font-size:14px;color:var(--accent);margin-top:4px}
.alarm-close{
  padding:14px 40px;background:var(--amber);color:#1a0a00;
  border:none;border-radius:var(--radius);font-size:16px;font-weight:700;
  cursor:pointer;margin-top:8px
}

/* People management */
.people-list{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.person-chip{display:flex;align-items:center;gap:6px;background:var(--bg3);border-radius:20px;padding:5px 10px 5px 14px;font-size:13px;color:var(--text)}
.person-chip button{background:none;border:none;cursor:pointer;color:var(--text3);font-size:14px;padding:0 2px}
.person-chip button:hover{color:var(--red)}
.add-person-row{display:flex;gap:8px}
.add-person-row input{flex:1;background:var(--bg3);border:1px solid var(--bg4);border-radius:var(--radius-sm);color:var(--text);padding:8px 12px;font-size:14px}
.add-person-row input:focus{outline:none;border-color:var(--accent)}
.add-person-row button{padding:8px 14px;background:var(--accent);color:#0c1a2e;border:none;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer}
</style>
</head>
<body>

<div class="alarm-overlay" id="alarm-overlay">
  <div class="alarm-icon">🔔</div>
  <div class="alarm-title" id="alarm-title">تذكير موعد</div>
  <div class="alarm-sub" id="alarm-sub"></div>
  <div class="alarm-person" id="alarm-person"></div>
  <button class="alarm-close" onclick="closeAlarm()">إغلاق التنبيه</button>
</div>

<div class="app">
  <div class="header">
    <div class="header-left">
      <div class="header-clock" id="clock">--:--</div>
      <div class="header-date" id="hdate">...</div>
    </div>
    <div class="next-badge" id="next-badge" style="display:none"></div>
  </div>

  <nav class="nav">
    <button class="nav-btn active" onclick="go('home')">الرئيسية</button>
    <button class="nav-btn" onclick="go('meetings')">مواعيد المدير</button>
    <button class="nav-btn" onclick="go('tasks')">مهام اليوم</button>
    <button class="nav-btn" onclick="go('add')">إضافة موعد</button>
    <button class="nav-btn" onclick="go('people')">الأشخاص</button>
  </nav>

  <!-- HOME -->
  <div class="content active" id="sec-home">
    <div class="sync-bar">
      <span><span class="sync-dot" id="sync-dot"></span> <span id="sync-label">جاري المزامنة...</span></span>
      <span id="sync-time" style="font-size:11px"></span>
    </div>
    <div class="alert-bar" id="alert-bar"></div>
    <div class="summary">
      <div class="stat"><div class="stat-num" id="s-today">0</div><div class="stat-label">مواعيد اليوم</div></div>
      <div class="stat"><div class="stat-num" id="s-upcoming">0</div><div class="stat-label">قادمة</div></div>
      <div class="stat"><div class="stat-num" id="s-tasks">0</div><div class="stat-label">مهام اليوم</div></div>
    </div>
    <div class="card">
      <div class="card-title">▸ أقرب موعد</div>
      <div id="home-next"></div>
    </div>
    <div class="card">
      <div class="card-title">▸ مهام لم تنجز اليوم</div>
      <div id="home-tasks"></div>
    </div>
  </div>

  <!-- MEETINGS -->
  <div class="content" id="sec-meetings">
    <div class="alert-bar" id="alert-bar2"></div>
    <div id="meetings-list"></div>
  </div>

  <!-- TASKS -->
  <div class="content" id="sec-tasks">
    <div class="stickies">
      <div class="sticky sticky-today">
        <div class="sticky-header">
          <span class="sticky-label">▸ مهام اليوم</span>
          <span class="sticky-date" id="today-lbl"></span>
        </div>
        <div class="task-list" id="today-list"></div>
        <div class="task-add">
          <input id="today-inp" type="text" placeholder="مهمة جديدة..."/>
          <button onclick="addTask('today')">+</button>
        </div>
      </div>
      <div class="sticky sticky-tomorrow">
        <div class="sticky-header">
          <span class="sticky-label">▸ مهام الغد</span>
          <span class="sticky-date" id="tom-lbl"></span>
        </div>
        <div class="task-list" id="tom-list"></div>
        <div class="task-add">
          <input id="tom-inp" type="text" placeholder="مهمة الغد..."/>
          <button onclick="addTask('tomorrow')">+</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ADD MEETING -->
  <div class="content" id="sec-add">
    <div class="card">
      <div class="card-title">إضافة موعد أو اجتماع</div>
      <div class="form-row">
        <label>عنوان الموعد</label>
        <input type="text" id="f-title" placeholder="مثال: اجتماع مجلس الإدارة"/>
      </div>
      <div class="form-row">
        <label>التاريخ</label>
        <input type="date" id="f-date"/>
      </div>
      <div class="form-row">
        <label>الوقت</label>
        <input type="time" id="f-time"/>
      </div>
      <div class="form-row">
        <label>التذكير</label>
        <select id="f-remind">
          <option value="5">قبل 5 دقائق</option>
          <option value="10">قبل 10 دقائق</option>
          <option value="15" selected>قبل 15 دقيقة</option>
          <option value="30">قبل 30 دقيقة</option>
          <option value="60">قبل ساعة</option>
          <option value="120">قبل ساعتين</option>
          <option value="1440">قبل يوم كامل</option>
        </select>
      </div>
      <div class="form-row">
        <label>الشخص المعني (اختياري)</label>
        <select id="f-person">
          <option value="">-- اختر شخص --</option>
        </select>
      </div>
      <div class="form-row">
        <label>ملاحظة (اختياري)</label>
        <input type="text" id="f-note" placeholder="أي تفاصيل إضافية"/>
      </div>
      <button class="submit-btn" onclick="saveMeeting()">حفظ الموعد</button>
    </div>
  </div>

  <!-- PEOPLE -->
  <div class="content" id="sec-people">
    <div class="card">
      <div class="card-title">إدارة الأشخاص</div>
      <div class="people-list" id="people-list"></div>
      <div class="add-person-row">
        <input type="text" id="person-inp" placeholder="اسم الشخص (مثال: المدير، أحمد)"/>
        <button onclick="addPerson()">إضافة</button>
      </div>
    </div>
    <div style="font-size:12px;color:var(--text3);padding:4px 0">
      الأشخاص المضافون هنا ستجدهم في قائمة اختيار عند إضافة موعد
    </div>
  </div>
</div>

<script>
const DAYS=['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];
const MONTHS=['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];

const SYNC_KEY='mgr_data_v2';
let data={meetings:[],tasks:{today:[],tomorrow:[]},people:[],notified:[]};
let alarmInterval=null;
let alarmAudio=null;

function getKey(){return 'mgr_'+location.hostname+location.pathname;}

function loadData(){
  try{
    const raw=localStorage.getItem(SYNC_KEY);
    if(raw) data=JSON.parse(raw);
  }catch(e){}
}

function saveData(){
  try{
    data.lastSaved=Date.now();
    localStorage.setItem(SYNC_KEY,JSON.stringify(data));
    updateSyncBar(true);
  }catch(e){updateSyncBar(false,true);}
}

function updateSyncBar(ok,err){
  const dot=document.getElementById('sync-dot');
  const lbl=document.getElementById('sync-label');
  const tim=document.getElementById('sync-time');
  if(err){dot.className='sync-dot error';lbl.textContent='خطأ في الحفظ';return;}
  dot.className='sync-dot';
  lbl.textContent='محفوظ محلياً';
  if(data.lastSaved) tim.textContent='آخر حفظ: '+new Date(data.lastSaved).toLocaleTimeString('ar-SA',{hour:'2-digit',minute:'2-digit'});
}

function go(sec){
  document.querySelectorAll('.content').forEach(e=>e.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(e=>e.classList.remove('active'));
  document.getElementById('sec-'+sec).classList.add('active');
  const idx={home:0,meetings:1,tasks:2,add:3,people:4}[sec];
  document.querySelectorAll('.nav-btn')[idx].classList.add('active');
  if(sec==='home')renderHome();
  if(sec==='meetings')renderMeetings();
  if(sec==='tasks')renderTasks();
  if(sec==='add')renderPersonSelect();
  if(sec==='people')renderPeople();
}

function fmtDate(dt){return `${DAYS[dt.getDay()]}، ${dt.getDate()} ${MONTHS[dt.getMonth()]}`}
function fmtTime(dt){return dt.toLocaleTimeString('ar-SA',{hour:'2-digit',minute:'2-digit'})}

function renderMeetingItem(m,now){
  const mt=new Date(m.date+'T'+m.time);
  const diff=(mt-now)/60000;
  let badgeHtml='',dotClass='';
  if(diff<-5){badgeHtml='<span class="badge badge-past">انتهى</span>';dotClass='past';}
  else if(diff<0){badgeHtml='<span class="badge badge-now">الآن</span>';dotClass='soon';}
  else if(diff<=30){badgeHtml='<span class="badge badge-soon">قريباً</span>';dotClass='soon';}
  else{badgeHtml='<span class="badge badge-ok">قادم</span>';}
  return `<div class="meeting">
    <div class="meeting-dot ${dotClass}"></div>
    <div class="meeting-body">
      <div class="meeting-title">${m.title}</div>
      <div class="meeting-meta">${fmtDate(mt)} · ${fmtTime(mt)} · تذكير قبل ${m.remind} دقيقة</div>
      ${m.person?`<span class="meeting-person">👤 ${m.person}</span>`:''}
      ${m.note?`<div class="meeting-note">${m.note}</div>`:''}
    </div>
    <div class="meeting-actions">
      ${badgeHtml}
      <button class="del-btn" onclick="delMeeting(${m.id})">✕</button>
    </div>
  </div>`;
}

function renderMeetings(){
  const now=new Date();
  const list=document.getElementById('meetings-list');
  if(!data.meetings.length){list.innerHTML='<div class="empty">لا توجد مواعيد مسجلة</div>';return;}
  const todayStr=now.toISOString().split('T')[0];
  const upcoming=data.meetings.filter(m=>m.date>=todayStr);
  const past=data.meetings.filter(m=>m.date<todayStr);
  let html='';
  if(upcoming.length) html+=`<div class="card"><div class="card-title">المواعيد القادمة (${upcoming.length})</div>${upcoming.map(m=>renderMeetingItem(m,now)).join('')}</div>`;
  if(past.length) html+=`<div class="card"><div class="card-title">المواعيد السابقة</div>${past.map(m=>renderMeetingItem(m,now)).join('')}</div>`;
  list.innerHTML=html;
}

function renderHome(){
  const now=new Date();
  const todayStr=now.toISOString().split('T')[0];
  const todayM=data.meetings.filter(m=>m.date===todayStr);
  const upcoming=data.meetings.filter(m=>{const mt=new Date(m.date+'T'+m.time);return mt>now;});
  const pending=data.tasks.today.filter(t=>!t.done);
  document.getElementById('s-today').textContent=todayM.length;
  document.getElementById('s-upcoming').textContent=upcoming.length;
  document.getElementById('s-tasks').textContent=pending.length;
  const nextEl=document.getElementById('home-next');
  if(upcoming.length){
    const m=upcoming[0];
    const mt=new Date(m.date+'T'+m.time);
    const diff=Math.round((mt-now)/60000);
    nextEl.innerHTML=renderMeetingItem(m,now)+`<div style="margin-top:8px;font-size:13px;color:var(--text2)">بعد ${diff<60?diff+' دقيقة':Math.round(diff/60)+' ساعة'}</div>`;
  } else {
    nextEl.innerHTML='<div class="empty" style="padding:16px 0">لا توجد مواعيد قادمة</div>';
  }
  const htasks=document.getElementById('home-tasks');
  if(pending.length){
    htasks.innerHTML=pending.map(t=>`<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--bg3)"><span style="color:var(--green);font-size:16px">○</span><span style="font-size:14px;color:var(--text)">${t.text}</span></div>`).join('');
  } else {
    htasks.innerHTML='<div class="empty" style="padding:16px 0">أنجزت كل المهام!</div>';
  }
  updateSyncBar(true);
}

function renderTasks(){
  const now=new Date();
  const tom=new Date(now); tom.setDate(tom.getDate()+1);
  document.getElementById('today-lbl').textContent=`${now.getDate()} ${MONTHS[now.getMonth()]}`;
  document.getElementById('tom-lbl').textContent=`${tom.getDate()} ${MONTHS[tom.getMonth()]}`;
  ['today','tomorrow'].forEach(w=>{
    const listEl=document.getElementById(w==='today'?'today-list':'tom-list');
    if(!data.tasks[w].length){listEl.innerHTML='<div style="font-size:13px;color:var(--text3);padding:8px 0">لا توجد مهام بعد</div>';return;}
    listEl.innerHTML=data.tasks[w].map(t=>`
      <div class="task-item">
        <input type="checkbox" class="task-check" ${t.done?'checked':''} onchange="toggleTask('${w}',${t.id})"/>
        <span class="task-text ${t.done?'done':''}" onclick="toggleTask('${w}',${t.id})">${t.text}</span>
        <button class="task-del" onclick="delTask('${w}',${t.id})">✕</button>
      </div>`).join('');
  });
}

function addTask(w){
  const inp=document.getElementById(w==='today'?'today-inp':'tom-inp');
  const val=inp.value.trim();
  if(!val)return;
  data.tasks[w].push({id:Date.now(),text:val,done:false});
  saveData();renderTasks();
  inp.value='';inp.focus();
}

function toggleTask(w,id){
  const t=data.tasks[w].find(t=>t.id===id);
  if(t){t.done=!t.done;saveData();renderTasks();}
}

function delTask(w,id){
  data.tasks[w]=data.tasks[w].filter(t=>t.id!==id);
  saveData();renderTasks();
}

function renderPersonSelect(){
  const sel=document.getElementById('f-person');
  sel.innerHTML='<option value="">-- اختر شخص --</option>';
  (data.people||[]).forEach(p=>{
    const o=document.createElement('option');
    o.value=p;o.textContent=p;sel.appendChild(o);
  });
}

function renderPeople(){
  const list=document.getElementById('people-list');
  if(!data.people||!data.people.length){list.innerHTML='<div style="font-size:13px;color:var(--text3)">لا يوجد أشخاص بعد</div>';return;}
  list.innerHTML=data.people.map(p=>`
    <div class="person-chip">
      <span>${p}</span>
      <button onclick="delPerson('${p}')">✕</button>
    </div>`).join('');
}

function addPerson(){
  const inp=document.getElementById('person-inp');
  const val=inp.value.trim();
  if(!val)return;
  if(!data.people) data.people=[];
  if(data.people.includes(val)){inp.value='';return;}
  data.people.push(val);
  saveData();renderPeople();
  inp.value='';inp.focus();
}

function delPerson(name){
  data.people=data.people.filter(p=>p!==name);
  saveData();renderPeople();
}

function saveMeeting(){
  const title=document.getElementById('f-title').value.trim();
  const date=document.getElementById('f-date').value;
  const time=document.getElementById('f-time').value;
  const remind=parseInt(document.getElementById('f-remind').value);
  const person=document.getElementById('f-person').value;
  const note=document.getElementById('f-note').value.trim();
  if(!title||!date||!time){showToast('يرجى تعبئة العنوان والتاريخ والوقت');return;}
  data.meetings.push({id:Date.now(),title,date,time,remind,person,note});
  data.meetings.sort((a,b)=>new Date(a.date+'T'+a.time)-new Date(b.date+'T'+b.time));
  saveData();
  document.getElementById('f-title').value='';
  document.getElementById('f-note').value='';
  document.getElementById('f-person').value='';
  showToast('تم حفظ الموعد بنجاح ✓');
  requestNotif();
  setTimeout(()=>go('meetings'),1200);
}

function delMeeting(id){
  data.meetings=data.meetings.filter(m=>m.id!==id);
  saveData();renderMeetings();
}

function showToast(msg){
  let t=document.getElementById('toast');
  if(!t){t=document.createElement('div');t.id='toast';
    t.style.cssText='position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-100px);background:var(--amber);color:#1a0a00;border-radius:var(--radius);padding:12px 20px;font-size:14px;font-weight:600;z-index:8888;transition:transform .3s cubic-bezier(.34,1.56,.64,1);max-width:320px;text-align:center';
    document.body.appendChild(t);}
  t.textContent=msg;
  t.style.transform='translateX(-50%) translateY(0)';
  setTimeout(()=>t.style.transform='translateX(-50%) translateY(-100px)',2800);
}

function startAlarmSound(){
  stopAlarmSound();
  function beep(){
    try{
      const ctx=new(window.AudioContext||window.webkitAudioContext)();
      [[880,.0],[1100,.25],[880,.5],[1100,.75]].forEach(([f,d])=>{
        const o=ctx.createOscillator(),g=ctx.createGain();
        o.connect(g);g.connect(ctx.destination);
        o.frequency.value=f;g.gain.value=0.3;
        o.start(ctx.currentTime+d);o.stop(ctx.currentTime+d+0.18);
      });
    }catch(e){}
  }
  beep();
  alarmInterval=setInterval(beep,3000);
}

function stopAlarmSound(){
  if(alarmInterval){clearInterval(alarmInterval);alarmInterval=null;}
}

function showAlarm(m,diff){
  const overlay=document.getElementById('alarm-overlay');
  document.getElementById('alarm-title').textContent=m.title;
  document.getElementById('alarm-sub').textContent=`الموعد بعد ${Math.round(diff)} دقيقة — ${new Date(m.date+'T'+m.time).toLocaleTimeString('ar-SA',{hour:'2-digit',minute:'2-digit'})}`;
  document.getElementById('alarm-person').textContent=m.person?`👤 ${m.person}`:'';
  overlay.classList.add('show');
  startAlarmSound();
  if(Notification.permission==='granted'){
    new Notification('تذكير موعد المدير',{body:`${m.title}${m.person?' - '+m.person:''} · بعد ${Math.round(diff)} دقيقة`,requireInteraction:true});
  }
}

function closeAlarm(){
  document.getElementById('alarm-overlay').classList.remove('show');
  stopAlarmSound();
}

function requestNotif(){
  if('Notification'in window&&Notification.permission==='default') Notification.requestPermission();
}

function checkReminders(){
  const now=new Date();
  let alertMsg='';
  data.meetings.forEach(m=>{
    const mt=new Date(m.date+'T'+m.time);
    const diff=(mt-now)/60000;
    const key=`${m.id}_${m.remind}`;
    if(diff>0&&diff<=m.remind&&!(data.notified||[]).includes(key)){
      if(!data.notified) data.notified=[];
      data.notified.push(key);
      saveData();
      showAlarm(m,diff);
    }
    if(diff>0&&diff<=30&&!alertMsg) alertMsg=`⏰ "${m.title}" بعد ${Math.round(diff)} دقيقة`;
  });
  ['alert-bar','alert-bar2'].forEach(id=>{
    const el=document.getElementById(id);
    if(el){el.style.display=alertMsg?'block':'none';if(alertMsg)el.textContent=alertMsg;}
  });
  const nb=document.getElementById('next-badge');
  if(alertMsg){nb.style.display='block';nb.textContent=alertMsg;}
  else{nb.style.display='none';}
}

function tick(){
  const now=new Date();
  document.getElementById('clock').textContent=now.toLocaleTimeString('ar-SA',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  document.getElementById('hdate').textContent=`${DAYS[now.getDay()]}، ${now.getDate()} ${MONTHS[now.getMonth()]} ${now.getFullYear()}`;
  checkReminders();
}

function migrateTasks(){
  const todayStr=new Date().toISOString().split('T')[0];
  const last=localStorage.getItem('m_last_day')||'';
  if(last&&last!==todayStr){
    data.tasks.today=data.tasks.tomorrow||[];
    data.tasks.tomorrow=[];
    saveData();
  }
  localStorage.setItem('m_last_day',todayStr);
}

document.getElementById('f-date').valueAsDate=new Date();
const now0=new Date();
document.getElementById('f-time').value=`${String(now0.getHours()).padStart(2,'0')}:${String(now0.getMinutes()).padStart(2,'0')}`;
document.getElementById('today-inp').addEventListener('keydown',e=>{if(e.key==='Enter')addTask('today')});
document.getElementById('tom-inp').addEventListener('keydown',e=>{if(e.key==='Enter')addTask('tomorrow')});
document.getElementById('person-inp').addEventListener('keydown',e=>{if(e.key==='Enter')addPerson()});

loadData();
migrateTasks();
renderHome();
tick();
setInterval(tick,1000);
requestNotif();
if('serviceWorker'in navigator) navigator.serviceWorker.register('./sw.js');
</script>
</body>
</html>
